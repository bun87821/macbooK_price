name: 補發歡迎說明書（一次性）

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refurb-check          # 跟主排程共用，避免同時寫 tg_offset.json
  cancel-in-progress: false

jobs:
  blast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 發送歡迎說明書
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python welcome_blast.py

      - name: 更新狀態檔
        run: |
          git config user.name "refurb-bot"
          git config user.email "bot@users.noreply.github.com"
          git add tg_offset.json
          git diff --cached --quiet || git commit -m "mark backlog users as greeted [skip ci]"
          git pull --rebase origin main
          git push
